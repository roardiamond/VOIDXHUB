<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOIDXHUB - Laser Location</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background:#05050a;
      color:#e0e0ff;
      min-height:100vh;
      overflow-x:hidden;
    }
    .bg-blackhole {
      position:fixed;
      inset:0;
      background:radial-gradient(circle at center, #1a0033 10%, #000000 85%);
      z-index:-3;
    }
    .void-logo-bg {
      position:fixed;
      inset:0;
      background:url('sQz8x (1).jpg') center/cover no-repeat;
      opacity:0.09;
      filter:blur(3px) brightness(1.3);
      animation:logoPulse 28s ease-in-out infinite;
      z-index:-2;
      mix-blend-mode:screen;
    }
    @keyframes logoPulse {
      0%,100%{opacity:0.07;transform:scale(1)}
      50%{opacity:0.14;transform:scale(1.04)}
    }
    .price-card {
      transition:all 0.4s;
    }
    .price-card:hover {
      transform:scale(1.08);
      box-shadow:0 0 40px #22ff88;
    }
  </style>
</head>
<body>
  <div class="bg-blackhole"></div>
  <div class="void-logo-bg"></div>

  <div class="relative z-10 py-12 px-6 max-w-5xl mx-auto">
    <h1 class="text-5xl font-black text-center tracking-widest glitch mb-8">LASER LOCATION</h1>

    <!-- Slider -->
    <div class="slider-container mx-auto mb-12" style="max-width:720px;">
      <div class="slider" style="overflow:hidden; border-radius:20px; border:3px solid #67e8f9; box-shadow:0 0 60px rgba(103,232,249,0.6);">
        <div class="slides" id="slides" style="display:flex; transition:transform 0.6s ease-in-out;">
          <div class="slide" style="min-width:100%;"><img src="laser.jpg" style="width:100%; max-height:420px; object-fit:cover;" alt="1"></div>
          <div class="slide" style="min-width:100%;"><img src="vending.jpg" style="width:100%; max-height:420px; object-fit:cover;" alt="2"></div>
          <div class="slide" style="min-width:100%;"><img src="coin.jpg" style="width:100%; max-height:420px; object-fit:cover;" alt="3"></div>
        </div>
      </div>
      <!-- Left Arrow -->
      <div onclick="prevSlide()" style="position:absolute; left:20px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.7); color:white; width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; z-index:10;">‹</div>
      <!-- Right Arrow -->
      <div onclick="nextSlide()" style="position:absolute; right:20px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.7); color:white; width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; z-index:10;">›</div>
    </div>

    <!-- Features -->
    <div class="text-center mb-12">
      <h2 class="text-3xl font-bold mb-4 text-cyan-300">FEATURES</h2>
      <p class="text-xl text-gray-300">
        Laser on the enemies<br>
        Invisible vending machine so that you can camp in it<br>
        An arrow will appear on the 500 tokens in match
      </p>
    </div>

    <!-- Pricing -->
    <div class="grid md:grid-cols-3 gap-8">
      <!-- Public Bypass -->
      <div class="price-card bg-zinc-950 border border-cyan-400 rounded-3xl p-8 text-center">
        <h3 class="text-2xl font-bold text-cyan-300">PUBLIC BYPASS</h3>
        <p class="text-5xl font-black text-white my-6">₹49</p>
        <button onclick="buyNow('Laser Location', 'Public Bypass', '29')" 
                class="w-full py-5 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-2xl font-bold text-xl">BUY NOW</button>
      </div>

      <!-- Private Bypass -->
      <div class="price-card bg-zinc-950 border border-purple-400 rounded-3xl p-8 text-center">
        <h3 class="text-2xl font-bold text-purple-300">PRIVATE BYPASS</h3>
        <p class="text-5xl font-black text-white my-6">₹299</p>
        <button onclick="buyNow('Laser Location', 'Private Bypass', '199')" 
                class="w-full py-5 bg-gradient-to-r from-purple-500 to-pink-600 rounded-2xl font-bold text-xl">BUY NOW</button>
      </div>

      <!-- Personal Bypass -->
      <div class="price-card bg-zinc-950 border border-emerald-400 rounded-3xl p-8 text-center scale-110 shadow-2xl">
        <div class="bg-purple-600 text-white text-sm font-bold px-6 py-1 rounded-full inline-block mb-4">RECOMMENDED</div>
        <h3 class="text-2xl font-bold text-emerald-300">PERSONAL BYPASS</h3>
        <p class="text-5xl font-black text-white my-6">₹1100</p>
        <button onclick="buyNow('Laser Location', 'Personal Bypass', '799')" 
                class="w-full py-5 bg-gradient-to-r from-emerald-500 to-cyan-600 rounded-2xl font-bold text-xl">BUY NOW</button>
      </div>
    </div>

    <div class="text-center mt-12">
      <button onclick="window.location.href='tools.html'"
              class="text-gray-400 hover:text-white text-lg">← Back to All Tools</button>
    </div>
  </div>

  <!-- Purchase Notification Script -->
  <script>
    function buyNow(service, plan, amount) {
      const username = prompt("Enter your Telegram Username (without @)") || "Anonymous";

      const paymentOptions = ["UPI", "Paytm", "PhonePe", "Google Pay", "Other"];
      let choice = prompt("Choose Payment Method:\n1. UPI\n2. Paytm\n3. PhonePe\n4. Google Pay\n5. Other\n\nEnter number (1-5):") || "1";
      const paymentMethod = paymentOptions[parseInt(choice)-1] || "UPI";

      const message = `🚀 New Paid Order on VoidXHub!\n\n` +
                      `Service: ${service}\n` +
                      `Plan: ${plan}\n` +
                      `Amount: ₹${amount}\n` +
                      `User: @${username}\n` +
                      `Payment: ${paymentMethod}\n` +
                      `Time: ${new Date().toLocaleString('en-IN')}`;

      // Send to your Bot
      fetch(`https://api.telegram.org/bot8618540927:AAELSHJCjpXYfDwomLTiFHG1AnGs7Ja5UJs/sendMessage?chat_id=7994843509&text=${encodeURIComponent(message)}&parse_mode=HTML`)
        .then(() => {
          alert(`✅ Order Placed Successfully!\n\nNOTIFICATION SENT TO ADMIN AND HE WILL CONTACT YOU SOON `);
        })
        .catch(() => {
          alert(`✅ Order Placed!\n\nNotification sent to bot.`);
        });
    }

    // Slider Script
    let currentSlide = 0;
    const totalSlides = 3;
    const slidesContainer = document.getElementById('slides');

    function showSlide(n) {
      slidesContainer.style.transform = `translateX(-${n * 100}%)`;
    }
    function nextSlide() {
      currentSlide = (currentSlide + 1) % totalSlides;
      showSlide(currentSlide);
    }
    function prevSlide() {
      currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
      showSlide(currentSlide);
    }
  </script>
</body>
</html>
