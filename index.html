<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOIDXHUB</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: linear-gradient(135deg, #0a0a0a, #1a0033);
  color: white;
}
.neon-text {
  text-shadow: 0 0 30px #00ff9d;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="bg-black/90 border-b border-green-500 p-4 flex justify-between items-center">

<h1 class="text-2xl text-green-400 neon-text font-bold">VOIDXHUB</h1>

<div class="flex items-center gap-4">

<a href="shop.html">Shop</a>
<a href="tournament.html">Tournament</a>
<a href="dashboard.html" onclick="checkLogin(event)">Dashboard</a>

<!-- AUTH BUTTONS -->
<div id="authButtons" class="flex gap-3">
  <a href="login.html" class="text-green-400">Login</a>
  <a href="register.html" class="bg-green-500 text-black px-3 py-1 rounded">Register</a>
</div>

<!-- PROFILE -->
<div id="profileWrap" class="hidden relative">

<button onclick="toggleMenu()" class="flex items-center gap-2">
  <img id="profilePic" class="w-9 h-9 rounded-full border border-green-400">
</button>

<!-- DROPDOWN -->
<div id="dropdown" class="hidden absolute right-0 mt-3 w-44 bg-zinc-900 border border-green-500 rounded-xl shadow-lg">

  <a href="profile.html" class="block px-4 py-2 hover:bg-zinc-800">
    👤 Profile
  </a>

  <a href="dashboard.html" class="block px-4 py-2 hover:bg-zinc-800">
    📊 Dashboard
  </a>

  <button onclick="logout()" 
  class="w-full text-left px-4 py-2 hover:bg-red-500/20 text-red-400">
    🚪 Logout
  </button>

</div>

</div>

</div>
</nav>

<!-- HERO -->
<div class="text-center mt-20">

<h1 class="text-5xl text-green-400 neon-text mb-4">WELCOME TO VOIDXHUB</h1>

<p class="text-gray-400 mb-6">
Gaming Store • Wallet • Tournaments • Topups
</p>

<a href="dashboard.html" onclick="checkLogin(event)"
class="bg-green-500 text-black px-6 py-3 rounded text-lg">
Open Dashboard
</a>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://abtgulackvuozotctahf.supabase.co",
  "sb_publishable_RLEiyZlSxKgWSzYT517FlQ_iytHhAHr"
);

// 🔐 AUTH CHECK
async function checkAuth() {
  const { data } = await supabase.auth.getSession();
  const user = data.session?.user;

  const authButtons = document.getElementById("authButtons");
  const profileWrap = document.getElementById("profileWrap");

  if (!user) {
    authButtons.classList.remove("hidden");
    profileWrap.classList.add("hidden");
    return;
  }

  authButtons.classList.add("hidden");
  profileWrap.classList.remove("hidden");

  const name = user.email.split("@")[0];

  document.getElementById("profilePic").src =
    `https://api.dicebear.com/7.x/initials/svg?seed=${name}`;
}

// 🔽 TOGGLE DROPDOWN
function toggleMenu() {
  document.getElementById("dropdown").classList.toggle("hidden");
}

// 🚪 LOGOUT
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

// 🔒 LOGIN CHECK
function checkLogin(e) {
  const session = localStorage.getItem("sb-abtgulackvuozotctahf-auth-token");

  if (!session) {
    e.preventDefault();
    alert("❌ Please login first");
    window.location.href = "login.html";
  }
}

// CLOSE DROPDOWN CLICK OUTSIDE
document.addEventListener("click", function(e) {
  const dropdown = document.getElementById("dropdown");
  const wrap = document.getElementById("profileWrap");

  if (!wrap.contains(e.target)) {
    dropdown.classList.add("hidden");
  }
});

// INIT
checkAuth();
</script>

</body>
</html>
