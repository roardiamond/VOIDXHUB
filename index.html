  <script>
    function normalizeEmail(email) {
      return String(email || "").trim().toLowerCase();
    }

    function getDisplayName(email) {
      const userPart = normalizeEmail(email).split("@")[0] || "player";
      return userPart
        .replace(/[._-]+/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function setupNavbarProfile() {
      const currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");
      const authLink = document.getElementById("authLink");
      const profileWrap = document.getElementById("profileMenuWrap");
      const nameEl = document.getElementById("navProfileName");
      const picEl = document.getElementById("navProfilePic");
      const menuBtn = document.getElementById("profileMenuButton");
      const dropdown = document.getElementById("profileDropdown");

      if (!currentUser.email) {
        authLink.classList.remove("hidden");
        profileWrap.classList.add("hidden");
        return;
      }

      authLink.classList.add("hidden");
      profileWrap.classList.remove("hidden");

      const displayName = getDisplayName(currentUser.email);
      nameEl.textContent = displayName;
      picEl.src = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(displayName)}`;

      menuBtn.addEventListener("click", function(event) {
        event.stopPropagation();
        dropdown.classList.toggle("hidden");
      });

      document.addEventListener("click", function() {
        dropdown.classList.add("hidden");
      });

      document.getElementById("logoutBtn").addEventListener("click", function() {
        localStorage.removeItem("currentUser");
        sessionStorage.removeItem("adminVerified");
        sessionStorage.removeItem("impersonatingFromAdmin");
        sessionStorage.removeItem("adminOriginalEmail");
        window.location.href = "login.html";
      });
    }

    window.onload = setupNavbarProfile;
  </script>
</body>
