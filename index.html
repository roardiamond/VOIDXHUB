<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOIDXHUB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: #05050a;
      color: #e0e0ff;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      background: linear-gradient(rgba(5, 5, 10, 0.75), rgba(5, 5, 10, 0.85)),
                  url('sQz8x (1).jpg') center/cover no-repeat fixed;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .scanline {
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(0, 255, 255, 0.06) 50%);
      background-size: 100% 8px;
      animation: scan 14s linear infinite;
      pointer-events: none;
      opacity: 0.7;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(400%); }
    }

    .glitch {
      animation: glitch 2.5s infinite alternate;
      text-shadow: 0 0 20px #00ffff, 0 0 40px #ff00ff;
    }

    @keyframes glitch {
      0%,100% { transform: translate(0); }
      20% { transform: translate(-5px,5px); }
      40% { transform: translate(5px,-5px); }
      60% { transform: translate(-3px,3px); }
    }

    .neon-btn {
      transition: all 0.4s ease;
      box-shadow: 0 0 25px #00ffff;
    }
    .neon-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 50px #ff00ff, 0 0 80px #00ffff;
    }
  </style>
</head>
<body>

  <!-- Hero Section with VoidXHub Logo Background -->
  <div class="hero">
    <div class="scanline"></div>

    <!-- Top Right Join TG Button -->
    <div class="absolute top-6 right-6 z-50">
      <button onclick="showTGPopup()" 
              class="neon-btn flex items-center gap-3 bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-purple-600 hover:to-cyan-500 text-white font-bold px-8 py-4 rounded-2xl shadow-2xl border border-white/30 transition-all">
        <span class="text-2xl">🚀</span>
        <span>JOIN TELEGRAM</span>
      </button>
    </div>

    <div class="relative z-10 max-w-4xl px-6 py-20">
      <h1 class="text-7xl md:text-8xl font-black tracking-[6px] glitch mb-6">
        VOID<span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500">X</span>HUB
      </h1>
      <p class="text-3xl md:text-4xl text-cyan-300 mb-6 tracking-widest">UNDETECTABLE • POWERFUL • PREMIUM</p>
      
      <div class="mt-8 text-2xl text-gray-300 leading-relaxed">
        Welcome to VoidXHub<br>
        The underground hub for high-success automation tools.
      </div>

      <div class="mt-16">
        <button onclick="window.location.href='tools.html'"
                class="neon-btn px-12 py-6 text-xl font-bold border-2 border-cyan-400 bg-transparent rounded-2xl hover:bg-cyan-400 hover:text-black">
          BROWSE TOOLS
        </button>
      </div>

      <div class="mt-24 text-sm opacity-60">Built By YASHXCHI • VoidXHub 2026</div>
    </div>
  </div>

  <!-- Telegram Popup -->
  <div id="tgPopup" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 border-2 border-purple-500 rounded-3xl p-10 max-w-md w-full mx-4 text-center popup">
      <div class="text-6xl mb-6">🚀</div>
      <h2 class="text-3xl font-black text-purple-400 mb-6">JOIN VOIDXHUB COMMUNITY</h2>
      
      <div class="space-y-4">
        <a href="https://t.me/voidxhubscrims" target="_blank" 
           class="block w-full py-5 bg-gradient-to-r from-pink-600 to-purple-600 text-white font-bold text-xl rounded-2xl hover:scale-105 transition-all">
          📢 SCRIMS GROUP
        </a>
        
        <a href="https://t.me/voidxhub" target="_blank" 
           class="block w-full py-5 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold text-xl rounded-2xl hover:scale-105 transition-all">
          📣 OFFICIAL CHANNEL
        </a>
        
        <a href="https://t.me/Voidxhubsupport_bot" target="_blank" 
           class="block w-full py-5 bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold text-xl rounded-2xl hover:scale-105 transition-all">
          💬 SUPPORT BOT
        </a>
      </div>

      <button onclick="closeTGPopup()" 
              class="mt-8 text-gray-400 hover:text-white text-lg">Close</button>
    </div>
  </div>

  <script>
    function showTGPopup() {
      document.getElementById('tgPopup').classList.remove('hidden');
      document.getElementById('tgPopup').classList.add('flex');
    }

    function closeTGPopup() {
      document.getElementById('tgPopup').classList.add('hidden');
      document.getElementById('tgPopup').classList.remove('flex');
    }
  </script>
</body>
</html>
