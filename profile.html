<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - VOIDXHUB</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="min-h-screen bg-gradient-to-br from-black to-purple-950 text-white px-4 py-10">

<div class="max-w-3xl mx-auto">

<!-- HOME -->
<div class="flex justify-end mb-6">
  <a href="index.html" class="bg-zinc-900 border border-green-500 text-green-400 px-4 py-2 rounded-xl">
    Home
  </a>
</div>

<!-- PROFILE -->
<div class="bg-zinc-900 p-8 rounded-3xl border border-green-500/30">

<div class="flex flex-col sm:flex-row items-center gap-6">

<img id="profilePic" class="w-28 h-28 rounded-full border-4 border-green-400">

<div class="text-center sm:text-left">
  <h1 id="profileName" class="text-3xl text-green-400 font-bold">Loading...</h1>
  <p id="profileEmail" class="text-gray-300"></p>
  <p id="profileRole" class="text-green-300"></p>
  <p id="profileBalance" class="text-xl font-bold mt-2"></p>
</div>

</div>

</div>

<!-- ACTIONS -->
<div class="bg-zinc-900 p-8 rounded-3xl border border-green-500/30 mt-6">

<h2 class="text-2xl text-green-400 mb-4">Quick Access</h2>

<div class="grid grid-cols-2 gap-4">
  <a href="dashboard.html" class="bg-zinc-800 p-4 rounded-xl">Dashboard</a>
  <a href="shop.html" class="bg-zinc-800 p-4 rounded-xl">Shop</a>
  <a href="topup.html" class="bg-zinc-800 p-4 rounded-xl">Topup</a>
  <a href="tournament.html" class="bg-zinc-800 p-4 rounded-xl">Tournaments</a>
</div>

<button onclick="logout()" 
class="w-full mt-6 bg-red-500 py-3 rounded-xl">
Logout
</button>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://abtgulackvuozotctahf.supabase.co",
  "sb_publishable_RLEiyZlSxKgWSzYT517FlQ_iytHhAHr"
);

// 🔐 LOAD PROFILE
async function loadProfile() {

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    alert("Login required");
    window.location.href = "login.html";
    return;
  }

  // user table se data lao
  let { data } = await supabase
    .from("users")
    .select("*")
    .eq("id", user.id)
    .single();

  if (!data) {
    await supabase.from("users").insert({
      id: user.id,
      email: user.email,
      wallet: 0,
      role: "user"
    });

    data = { wallet: 0, role: "user" };
  }

  const name = user.email.split("@")[0];

  document.getElementById("profileName").innerText = name;
  document.getElementById("profileEmail").innerText = user.email;
  document.getElementById("profileRole").innerText = "Role: " + (data.role || "user");
  document.getElementById("profileBalance").innerText = "Wallet: ₹" + data.wallet;

  document.getElementById("profilePic").src =
    `https://api.dicebear.com/7.x/initials/svg?seed=${name}`;
}

// 🚪 LOGOUT
async function logout() {
  await supabase.auth.signOut();
  window.location.href = "login.html";
}

// INIT
loadProfile();
</script>

</body>
</html>
