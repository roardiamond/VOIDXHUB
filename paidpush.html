<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOIDXHUB - FREE FIRE PAID PUSH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background:#05050a;
      color:#e0e0ff;
      min-height:100vh;
      overflow-x:hidden;
    }
    .bg-blackhole {
      position:fixed;
      inset:0;
      background:radial-gradient(circle at center, #1a0033 10%, #000000 85%);
      z-index:-3;
    }
    .void-logo-bg {
      position:fixed;
      inset:0;
      background:url('sQz8x (1).jpg') center/cover no-repeat;
      opacity:0.09;
      filter:blur(3px) brightness(1.3);
      animation:logoPulse 28s ease-in-out infinite;
      z-index:-2;
      mix-blend-mode:screen;
    }
    @keyframes logoPulse {
      0%,100%{opacity:0.07;transform:scale(1)}
      50%{opacity:0.14;transform:scale(1.04)}
    }
    .price-card {
      transition:all 0.4s;
    }
    .price-card:hover {
      transform:scale(1.08);
      box-shadow:0 0 40px #22ff88;
    }
    .push-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    /* Auto Slider Styles */
    .auto-slider {
      position: relative;
      max-width: 720px;
      margin: 0 auto 40px;
      border-radius: 20px;
      overflow: hidden;
      border: 3px solid #67e8f9;
      box-shadow: 0 0 60px rgba(103, 232, 249, 0.6);
    }
    .slides-container {
      display: flex;
      transition: transform 0.8s ease-in-out;
    }
    .slide {
      min-width: 100%;
      position: relative;
    }
    .slide img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
    }
    .slider-dots {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 20;
    }
    .dot {
      width: 12px;
      height: 12px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s;
    }
    .dot.active {
      background: #67e8f9;
      transform: scale(1.3);
    }
  </style>
</head>
<body>
  <div class="bg-blackhole"></div>
  <div class="void-logo-bg"></div>

  <div class="relative z-10 py-12 px-6 max-w-5xl mx-auto">
    <h1 class="text-5xl font-black text-center tracking-widest glitch mb-10 text-violet-300">FREE FIRE PAID PUSH</h1>

    <!-- Auto Sliding Preview Slider -->
    <div class="auto-slider">
      <div class="slides-container" id="autoSlides">
        <div class="slide"><img src="brpush.jpg" alt="Battle Royale Push"></div>
        <div class="slide"><img src="cspush.jpg" alt="Clash Squad Push"></div>
      </div>

      <!-- Left Arrow -->
      <div onclick="prevAutoSlide()" 
           style="position:absolute; left:20px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.7); color:white; width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; z-index:30;">
        ‹
      </div>
      <!-- Right Arrow -->
      <div onclick="nextAutoSlide()" 
           style="position:absolute; right:20px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.7); color:white; width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; z-index:30;">
        ›
      </div>

      <!-- Dots -->
      <div class="slider-dots" id="dots"></div>
    </div>

    <!-- Features -->
    <div class="text-center mb-12">
      <h2 class="text-3xl font-bold mb-4 text-cyan-300">FEATURES</h2>
      <p class="text-xl text-gray-300">
        98% win guarantee in CS and 95% win guarantee in BR. No ban to the team, no derank.
      </p>
    </div>

    <!-- Side by Side Cards -->
    <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
      
      <!-- BR Push Card -->
      <div class="price-card bg-zinc-950 border border-cyan-400 rounded-3xl p-8 text-center">
        <img src="brpush.jpg" alt="BR Push" class="push-image">
        <h3 class="text-2xl font-bold text-cyan-300">BATTLE ROYALE RANK PUSH</h3>
        <p class="text-5xl font-black text-white my-6">₹100/rank<br><span class="text-xl text-gray-400">(Plat 1 - Plat 2)</span></p>
        <button onclick="buyNow('BR Rank Push', 'Battle Royale', '100 per rank')"
                class="w-full py-5 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-2xl font-bold text-xl">BUY NOW</button>
      </div>

      <!-- CS Push Card -->
      <div class="price-card bg-zinc-950 border border-purple-400 rounded-3xl p-8 text-center">
        <img src="cspush.jpg" alt="CS Push" class="push-image">
        <h3 class="text-2xl font-bold text-purple-300">CLASH SQUAD RANK PUSH</h3>
        <p class="text-5xl font-black text-white my-6">₹20/star 🌟</p>
        <button onclick="buyNow('CS Rank Push', 'Clash Squad', '20 per star')"
                class="w-full py-5 bg-gradient-to-r from-purple-500 to-pink-600 rounded-2xl font-bold text-xl">BUY NOW</button>
      </div>

    </div>

    <div class="text-center mt-16">
      <button onclick="window.location.href='tools.html'"
              class="text-gray-400 hover:text-white text-lg">← Back to All Tools</button>
    </div>
  </div>

  <!-- Purchase Script -->
  <script>
    function buyNow(service, plan, amount) {
      const username = prompt("Enter your Telegram Username (without @)") || "Anonymous";
      const paymentOptions = ["UPI", "Paytm", "PhonePe", "Google Pay", "Other"];
      let choice = prompt("Choose Payment Method:\n1. UPI\n2. Paytm\n3. PhonePe\n4. Google Pay\n5. Other\n\nEnter number (1-5):") || "1";
      const paymentMethod = paymentOptions[parseInt(choice)-1] || "UPI";

      const message = `🚀 New Paid Order on VoidXHub!\n\n` +
                      `Service: ${service}\n` +
                      `Plan: ${plan}\n` +
                      `Amount: ₹${amount}\n` +
                      `User: @${username}\n` +
                      `Payment: ${paymentMethod}\n` +
                      `Time: ${new Date().toLocaleString('en-IN')}`;

      fetch(`https://api.telegram.org/bot8618540927:AAELSHJCjpXYfDwomLTiFHG1AnGs7Ja5UJs/sendMessage?chat_id=7994843509&text=${encodeURIComponent(message)}&parse_mode=HTML`)
        .then(() => alert(`✅ Order Placed Successfully!\n\nNotification sent to admin. He will contact you soon.`))
        .catch(() => alert(`✅ Order Placed!`));
    }

    // ================== AUTO SLIDER SCRIPT ==================
    let currentAutoSlide = 0;
    const totalAutoSlides = 2;
    const autoSlidesContainer = document.getElementById('autoSlides');
    const dotsContainer = document.getElementById('dots');

    // Create Dots
    function createDots() {
      dotsContainer.innerHTML = '';
      for (let i = 0; i < totalAutoSlides; i++) {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        if (i === 0) dot.classList.add('active');
        dot.onclick = () => goToSlide(i);
        dotsContainer.appendChild(dot);
      }
    }

    function showAutoSlide(n) {
      autoSlidesContainer.style.transform = `translateX(-${n * 100}%)`;
      document.querySelectorAll('.dot').forEach((dot, index) => {
        dot.classList.toggle('active', index === n);
      });
    }

    function nextAutoSlide() {
      currentAutoSlide = (currentAutoSlide + 1) % totalAutoSlides;
      showAutoSlide(currentAutoSlide);
    }

    function prevAutoSlide() {
      currentAutoSlide = (currentAutoSlide - 1 + totalAutoSlides) % totalAutoSlides;
      showAutoSlide(currentAutoSlide);
    }

    function goToSlide(n) {
      currentAutoSlide = n;
      showAutoSlide(currentAutoSlide);
    }

    // Auto Slide every 4 seconds
    let autoSlideInterval;
    function startAutoSlide() {
      autoSlideInterval = setInterval(() => {
        nextAutoSlide();
      }, 4000);
    }

    // Initialize
    createDots();
    startAutoSlide();

    // Pause on hover
    const sliderElement = document.querySelector('.auto-slider');
    sliderElement.addEventListener('mouseenter', () => clearInterval(autoSlideInterval));
    sliderElement.addEventListener('mouseleave', () => startAutoSlide());
  </script>
</body>
</html>
