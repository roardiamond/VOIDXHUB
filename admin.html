<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-black text-white p-6">

<h1 class="text-3xl text-green-400 mb-6">👑 Admin Panel</h1>

<div id="requests"></div>

<script>
const supabase = window.supabase.createClient(
  "https://abtgulackvuozotctahf.supabase.co",
  "sb_publishable_RLEiyZlSxKgWSzYT517FlQ_iytHhAHr"
);

const ADMIN_EMAIL = "yashrawat9873@gmail.com";

// 🔐 CHECK ADMIN
async function checkAdmin() {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user || user.email !== ADMIN_EMAIL) {
    alert("Access Denied");
    window.location.href = "index.html";
    return;
  }

  loadRequests();
}

// 📥 LOAD PAYMENT REQUESTS
async function loadRequests() {
  const { data } = await supabase
    .from("payment_requests")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("requests");
  container.innerHTML = "";

  data.forEach(req => {
    container.innerHTML += `
      <div class="bg-zinc-900 p-4 rounded-xl mb-4">
        <p>Email: ${req.email}</p>
        <p>Amount: ₹${req.amount}</p>
        <p>Status: ${req.status}</p>

        ${req.status === "pending" ? `
          <button onclick="approve('${req.id}', '${req.user_id}', ${req.amount})"
          class="bg-green-500 px-3 py-1 mt-2 rounded">
            Approve
          </button>
        ` : ""}
      </div>
    `;
  });
}

// 💰 APPROVE PAYMENT
async function approve(id, userId, amount) {

  // wallet update
  await supabase.rpc("add_money", {
    uid: userId,
    amt: amount
  });

  // update status
  await supabase
    .from("payment_requests")
    .update({ status: "approved" })
    .eq("id", id);

  alert("Approved & Wallet Updated 💰");

  loadRequests();
}

// 🚀 INIT
checkAdmin();
</script>

</body>
</html>
