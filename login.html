<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - VOIDXHUB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { 
      background: linear-gradient(135deg, #0a0a0a, #1a0033); 
      color: white; 
    }
    .neon-text { 
      text-shadow: 0 0 30px #00ff9d; 
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center pt-10">

  <div class="bg-zinc-900 p-12 rounded-3xl w-full max-w-md border border-green-500/30 shadow-2xl">
    <a href="index.html" 
       class="inline-flex items-center gap-2 text-green-400 hover:text-green-300 mb-6">
      ← Back to Home
    </a>

    <h1 class="text-5xl font-black neon-text text-green-400 text-center mb-10">LOGIN</h1>
   
    <input id="email" type="email" placeholder="Email Address"
      class="w-full bg-black p-5 rounded-2xl mb-5 text-lg outline-none border border-green-500/30 focus:border-green-400">
    
    <div class="relative mb-8">
      <input id="password" type="password" placeholder="Password"
        class="w-full bg-black p-5 rounded-2xl text-lg outline-none border border-green-500/30 focus:border-green-400">
      <button onclick="togglePassword()" 
        class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white text-2xl">
        👁
      </button>
    </div>

    <button onclick="loginUser()" 
      class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-6 text-2xl rounded-2xl transition-all">
      LOGIN NOW
    </button>

    <p class="text-center mt-8 text-gray-400">
      Don't have account? 
      <a href="register.html" class="text-green-400 hover:underline">Register Here</a>
    </p>
  </div>

  <script>
    const supabaseUrl = 'https://abtgulackvuozotctahf.supabase.co';
    const supabaseKey = 'sb_publishable_RLEiyZLSxKgWSzYT517FlQ_iytl';

    const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

    let passwordVisible = false;

    function togglePassword() {
      const passInput = document.getElementById("password");
      passwordVisible = !passwordVisible;
      passInput.type = passwordVisible ? "text" : "password";
    }

    async function loginUser() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("❌ Please fill both Email and Password");
        return;
      }

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) {
          alert("❌ Login Failed: " + error.message);
        } else {
          alert("✅ Login Successful! Welcome back.");
          window.location.href = "index.html";
        }
      } catch (err) {
        alert("Error: " + err.message);
      }
    }
  </script>
</body>
</html>
