<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen text-white">

<!-- Back Button -->
<a href="index.html" 
class="absolute top-5 left-5 px-4 py-2 bg-green-500 text-black font-bold rounded-lg shadow-lg shadow-green-500/50 hover:bg-green-400 transition">
  ⬅ Back
</a>

<div class="bg-gray-900 p-6 rounded-xl shadow-lg w-80">
  <h2 class="text-2xl mb-4 text-center">Login</h2>

  <input type="email" id="email" placeholder="Email" class="w-full p-2 mb-3 rounded text-black">
  <input type="password" id="password" placeholder="Password" class="w-full p-2 mb-3 rounded text-black">

  <button onclick="loginUser()" 
  class="w-full bg-green-500 hover:bg-green-400 text-black font-bold py-2 rounded-lg shadow-lg shadow-green-500/50">
    Login
  </button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://abtgulackvuozotctahf.supabase.co",
  "sb_publishable_RLEiyZlSxKgWSzYT517FlQ_iytHhAHr"
);

async function loginUser() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    alert("❌ " + error.message);
  } else {
    alert("✅ Login Success");
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
