<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VOIDXHUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #05050a;
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(transparent 50%, rgba(0, 255, 255, 0.03) 50%);
            background-size: 100% 8px;
            animation: scan 14s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(400%); }
        }

        .login-container {
            background: #0a0a15;
            border: 2px solid #00ffff;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.05);
            width: 100%;
            max-width: 450px;
            padding: 50px;
            position: relative;
            z-index: 2;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            color: #00ffff;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ffff, 0 0 40px rgba(0, 255, 255, 0.5);
            letter-spacing: 3px;
            font-weight: 900;
        }

        .login-header p {
            color: #ff00ff;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #00ffff;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #00ffff;
            border-radius: 8px;
            font-size: 14px;
            background: rgba(0, 255, 255, 0.05);
            color: #e0e0ff;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s;
        }

        input::placeholder {
            color: rgba(0, 255, 255, 0.4);
        }

        input:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4), 0 0 40px rgba(255, 0, 255, 0.2);
            background: rgba(0, 255, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            color: #000;
            border: 2px solid #00ffff;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 20px #00ffff;
        }

        .login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #00ffff, 0 0 60px #ff00ff;
            border-color: #ff00ff;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .message {
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 13px;
            border: 2px solid;
            letter-spacing: 1px;
        }

        .error {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4444;
            border-color: #ff4444;
        }

        .success {
            background: rgba(0, 255, 100, 0.1);
            color: #00ff64;
            border-color: #00ff64;
        }

        .links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            font-size: 12px;
        }

        .links a {
            color: #ff00ff;
            text-decoration: none;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .links a:hover {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(0, 255, 255, 0.3);
        }

        .register-link p {
            color: #999;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .register-link a {
            color: #00ffff;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .register-link a:hover {
            text-shadow: 0 0 15px #00ffff;
        }

        .loading {
            display: none;
            text-align: center;
            color: #00ffff;
            font-size: 14px;
        }

        .spinner {
            border: 3px solid rgba(0, 255, 255, 0.2);
            border-top: 3px solid #00ffff;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
            box-shadow: 0 0 20px #00ffff;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Login to your VOIDXHUB account</p>
        </div>

        <div id="messageBox"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Logging in...</p>
            </div>

            <button type="submit" class="login-btn" id="submitBtn">Login</button>
        </form>

        <div class="links">
            <a href="#" onclick="showForgotPassword(); return false;">Forgot Password?</a>
        </div>

        <div class="register-link">
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const messageBox = document.getElementById('messageBox');
        const loading = document.getElementById('loading');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            loading.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const response = await fetch('backend/auth.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'login',
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'Login failed', 'error');
                    loading.style.display = 'none';
                    submitBtn.disabled = false;
                }
            } catch (error) {
                showMessage('An error occurred. Please try again.', 'error');
                loading.style.display = 'none';
                submitBtn.disabled = false;
            }
        });

        function showMessage(message, type) {
            messageBox.innerHTML = `<div class="message ${type}">${message}</div>`;
            messageBox.scrollIntoView({ behavior: 'smooth' });
        }

        function showForgotPassword() {
            showMessage('Password reset feature coming soon!', 'error');
        }
    </script>
</body>
</html>
