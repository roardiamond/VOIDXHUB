<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Register - VOIDXHUB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: linear-gradient(135deg, #0a0a0a, #1a0033); color: white; }
    .neon-text { text-shadow: 0 0 30px #00ff9d; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center pt-10">

  <div class="bg-zinc-900 p-12 rounded-3xl w-full max-w-md border border-green-500/30 shadow-2xl">
    <a href="index.html" class="text-green-400 mb-6 inline-block">← Back to Home</a>

    <h1 class="text-5xl font-black neon-text text-green-400 text-center mb-10">CREATE ACCOUNT</h1>
   
    <input id="email" type="email" placeholder="Email Address" class="w-full bg-black p-5 rounded-2xl mb-5 text-lg outline-none">
    <input id="pass" type="password" placeholder="Password (min 6 characters)" class="w-full bg-black p-5 rounded-2xl mb-8 text-lg outline-none">
   
    <button onclick="registerUser()" class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-6 text-2xl rounded-2xl">
      REGISTER NOW
    </button>

    <p class="text-center mt-8 text-gray-400">
      Already have account? <a href="login.html" class="text-green-400">Login Here</a>
    </p>
  </div>

  <script>
    const supabase = Supabase.createClient(
      'https://abtgulackvuozotctahf.supabase.co',
      'sb_publishable_RLEiyZLSxKgWSzYT517FlQ_iytl'
    );

    async function registerUser() {
      const email = document.getElementById("email").value.trim();
      const pass = document.getElementById("pass").value.trim();

      if (!email || !pass) return alert("❌ Fill all fields");
      if (pass.length < 6) return alert("❌ Password must be at least 6 characters");

      const { data, error } = await supabase.auth.signUp({
        email: email,
        password: pass
      });

      if (error) {
        alert("❌ " + error.message);
      } else {
        alert("✅ Account Created Successfully!\nNow login.");
        window.location.href = "login.html";
      }
    }
  </script>
</body>
</html>
