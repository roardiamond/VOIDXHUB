<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen text-white">

<!-- Back Button -->
<a href="index.html" 
class="absolute top-5 left-5 px-4 py-2 bg-green-500 text-black font-bold rounded-lg shadow-lg shadow-green-500/50 hover:bg-green-400 transition">
  ⬅ Back
</a>

<div class="bg-gray-900 p-6 rounded-xl shadow-lg w-80">

<h2 class="text-2xl mb-4 text-center">Register</h2>

<input id="email" type="email" placeholder="Email"
class="w-full p-2 mb-3 rounded text-black">

<!-- PASSWORD WITH SHOW/HIDE -->
<div class="relative">
  <input id="password" type="password" placeholder="Password"
  class="w-full p-2 mb-3 rounded text-black">

  <button onclick="togglePassword()" 
  class="absolute right-2 top-2 text-black text-sm">
    👁
  </button>
</div>

<button onclick="registerUser()" 
class="w-full bg-green-500 text-black py-2 rounded mb-3">
Register
</button>

<!-- OTP SIGNUP -->
<button onclick="signupOTP()" 
class="w-full bg-blue-500 py-2 rounded mb-3">
Signup with OTP
</button>

<!-- OTP INFO -->
<p id="otpMsg" class="hidden text-center text-green-400 mt-2">
  📩 Check your email to complete signup
</p>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://abtgulackvuozotctahf.supabase.co",
  "sb_publishable_RLEiyZlSxKgWSzYT517FlQ_iytHhAHr"
);

let passwordVisible = false;

// 👁 SHOW/HIDE PASSWORD
function togglePassword() {
  const pass = document.getElementById("password");

  passwordVisible = !passwordVisible;
  pass.type = passwordVisible ? "text" : "password";
}

// 🔐 NORMAL REGISTER
async function registerUser() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("❌ Fill all fields");
    return;
  }

  if (password.length < 6) {
    alert("❌ Password must be at least 6 characters");
    return;
  }

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    alert("❌ " + error.message);
  } else {
    alert("✅ Account Created");
    window.location.href = "login.html";
  }
}

// 📩 OTP SIGNUP
async function signupOTP() {
  const email = document.getElementById("email").value.trim();

  if (!email) {
    alert("❌ Enter email first");
    return;
  }

  const { error } = await supabase.auth.signInWithOtp({
    email: email
  });

  if (error) {
    alert("❌ " + error.message);
  } else {
    document.getElementById("otpMsg").classList.remove("hidden");
  }
}
</script>

</body>
</html>
