<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidXHub - Under Maintenance</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f0f0f, #1a0033);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff00cc, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.4rem;
            margin: 20px 0;
            opacity: 0.9;
        }
        .highlight {
            color: #00ffcc;
            font-weight: bold;
        }
        .loader {
            margin: 40px auto;
            width: 80px;
            height: 80px;
            border: 6px solid rgba(0, 255, 204, 0.2);
            border-top: 6px solid #00ffcc;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 60px;
            font-size: 1.1rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VoidXHub</h1>
        <div class="loader"></div>
        <p><span class="highlight">ADMIN IS BACK TO THE WORK </span> 🔥</p>
        <p>Wait for few days, update aa raha hai!</p>
        <p>Till then you can try other things 😉</p>
        
        <div class="footer">
            VoidXHub will be back stronger 💪<br>
            <span style="color:#ff00cc;">Stay tuned admin is cooking something big...</span>
        </div>
    </div>
</body>
</html>
