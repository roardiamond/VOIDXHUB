<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - VOIDXHUB</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: linear-gradient(135deg, #0a0a0a, #1a0033);
  color: white;
}
.neon-text {
  text-shadow: 0 0 30px #00ff9d;
}
</style>
</head>

<body class="pt-20 px-4">

<!-- BACK BUTTON -->
<div class="fixed top-6 right-6">
  <button onclick="goToHome()" 
  class="bg-zinc-900 border border-green-500 text-green-400 px-4 py-2 rounded-xl">
    ⬅ Back
  </button>
</div>

<div class="max-w-md mx-auto">

<h1 class="text-5xl text-green-400 text-center mb-10 neon-text">DASHBOARD</h1>

<div class="bg-zinc-900 p-8 rounded-3xl border border-green-500/30">

<p class="text-center text-gray-400">Wallet Balance</p>
<h2 id="balance" class="text-6xl text-green-400 text-center my-6">₹0</h2>

<button onclick="showAddMoney()" 
class="w-full bg-green-500 text-black font-bold py-4 rounded-xl mb-6">
+ ADD MONEY
</button>

<div class="grid grid-cols-2 gap-4">
  <a href="shop.html" class="bg-zinc-800 p-4 rounded-xl text-center">Shop</a>
  <a href="tournament.html" class="bg-zinc-800 p-4 rounded-xl text-center">Tournament</a>
</div>

<!-- ADMIN -->
<div id="adminSection" class="hidden mt-8">
  <button onclick="goToAdmin()" 
  class="w-full bg-red-500 py-3 rounded-xl">
    👑 Admin Panel
  </button>
</div>

</div>
</div>

<!-- QR MODAL -->
<div id="qrModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
  <div class="bg-zinc-900 p-6 rounded-2xl w-80">

    <h2 class="text-xl mb-4 text-center">Add Money</h2>

    <input id="paidAmount" type="number" placeholder="Enter Amount"
    class="w-full p-3 mb-4 bg-black rounded">

    <button onclick="submitPayment()" 
    class="w-full bg-green-500 text-black py-3 rounded">
      Submit
    </button>

    <button onclick="closeModal()" class="w-full mt-3 text-gray-400">
      Close
    </button>

  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://abtgulackvuozotctahf.supabase.co",
  "sb_publishable_RLEiyZlSxKgWSzYT517FlQ_iytHhAHr"
);

const ADMIN_EMAIL = "yashrawat9873@gmail.com";

// 🔐 CHECK USER
async function checkUser() {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  loadWallet(user);
  checkAdmin(user);
}

// 💰 LOAD WALLET
async function loadWallet(user) {
  let { data } = await supabase
    .from("users")
    .select("wallet")
    .eq("id", user.id)
    .single();

  if (!data) {
    await supabase.from("users").insert({
      id: user.id,
      email: user.email,
      wallet: 0
    });
    data = { wallet: 0 };
  }

  document.getElementById("balance").innerText = "₹" + data.wallet;
}

// 👑 ADMIN CHECK
function checkAdmin(user) {
  if (user.email === ADMIN_EMAIL) {
    document.getElementById("adminSection").classList.remove("hidden");
  }
}

// 💳 PAYMENT REQUEST
async function submitPayment() {
  const { data: { user } } = await supabase.auth.getUser();
  const amount = parseInt(document.getElementById("paidAmount").value);

  if (!amount || amount <= 0) {
    alert("Enter valid amount");
    return;
  }

  await supabase.from("payment_requests").insert({
    user_id: user.id,
    email: user.email,
    amount: amount,
    status: "pending"
  });

  alert("Request Sent 🔥");
  closeModal();
}

// MODAL
function showAddMoney() {
  document.getElementById("qrModal").classList.remove("hidden");
}
function closeModal() {
  document.getElementById("qrModal").classList.add("hidden");
}

// NAV
function goToHome() {
  window.location.href = "index.html";
}
function goToAdmin() {
  window.location.href = "admin.html";
}

// INIT
checkUser();
</script>

</body>
</html>
