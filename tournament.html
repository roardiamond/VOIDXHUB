<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tournaments - VOIDXHUB</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-black to-purple-950 text-white flex items-center justify-center px-4">
  <div class="max-w-xl w-full bg-zinc-900 border border-green-500/30 rounded-3xl p-8 text-center">
    <p class="inline-block px-4 py-2 rounded-full bg-green-500/20 border border-green-500/50 text-green-300 font-semibold mb-5">COMING SOON</p>
    <h1 class="text-4xl font-black text-green-400 mb-4">TOURNAMENTS</h1>
    <p class="text-gray-300 mb-2">Tournament module is under development.</p>
    <p class="text-gray-400 mb-8">Soon you'll see live events, registrations, and prize pool details here.</p>
    <div class="flex flex-wrap gap-3 justify-center">
      <a href="index.html" class="inline-block bg-green-500 hover:bg-green-600 text-black font-bold px-6 py-3 rounded-2xl">Back to Home</a>
      <a href="profile.html" class="inline-block bg-zinc-800 hover:bg-zinc-700 text-white font-bold px-6 py-3 rounded-2xl border border-green-500/30">Open Profile</a>
    </div>
  </div>
  <script>
    const currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");
    if (!currentUser.email) {
      alert("❌ Please login first.");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
